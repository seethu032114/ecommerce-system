services:

  discovery-server:
    build: ./discovery-server
    image: discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"

  api-gateway:
    build: ./api-gateway
    image: api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - discovery-server

  user-service:
    build: ./user-service
    image: user-service
    container_name: user-service
    depends_on:
      - discovery-server

  product-service:
    build: ./product-service
    image: product-service
    container_name: product-service
    depends_on:
      - discovery-server

  inventory-service:
    build: ./inventory-service
    image: inventory-service
    container_name: inventory-service
    depends_on:
      - discovery-server

  order-service:
    build: ./order-service
    image: order-service
    container_name: order-service
    depends_on:
      - discovery-server

  cart-service:
    build: ./cart-service
    image: cart-service
    container_name: cart-service
    depends_on:
      - discovery-server

