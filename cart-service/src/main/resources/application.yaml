spring:
  application:
    name: cart-service
  datasource:
    url: jdbc:h2:mem:cart-db
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
server:
  port: 0

eureka:
  client:
    enabled: false
    service-url:
      defaultZone: http://discovery-server:8761/eureka

resilience4j:
  circuitbreaker:
    instances:
      userServiceCB:
        register-health-indicator: true
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
      productServiceCB:
        register-health-indicator: true
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2
  retry:
    instances:
      userServiceRetry:
        max-attempts: 3
        wait-duration: 500ms
        retry-exception-predicate:
          - java.net.SocketTimeoutException
          - java.io.IOException
      productServiceRetry:
        max-attempts: 3
        wait-duration: 500ms
        retry-exception-predicate:
          - java.net.SocketTimeoutException
          - java.io.IOException
  timelimiter:
    instances:
      userServiceTL:
        timeout-duration: 2s
      productServiceTL:
        timeout-duration: 2s

logging:
  level:
    com.ecommerce.cart.client.UserClient: debug
    feign.logger: debug